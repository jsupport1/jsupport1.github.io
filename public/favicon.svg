<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D9B6B"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="15" fill="url(#g1)"/>
  <rect width="64" height="32" rx="15" fill="url(#g2)"/>

  <!-- Back doc (rotated) -->
  <rect x="22" y="15" width="20" height="26" rx="3"
        fill="rgba(255,255,255,0.2)" transform="rotate(-7 32 28)"/>

  <!-- Mid doc -->
  <rect x="21" y="14" width="21" height="27" rx="3"
        fill="rgba(255,255,255,0.28)" transform="rotate(-2.5 32 28)"/>

  <!-- Front doc - white sheet -->
  <rect x="18" y="12" width="24" height="31" rx="3.5" fill="white"/>

  <!-- Folded corner on front doc -->
  <polygon points="36,12 42,18 36,18" fill="#0D9B6B" opacity="0.75"/>

  <!-- Three content lines -->
  <rect x="22" y="22" width="12" height="2" rx="1" fill="#0D9B6B" opacity="0.85"/>
  <rect x="22" y="26" width="16" height="2" rx="1" fill="#0D9B6B" opacity="0.65"/>
  <rect x="22" y="30" width="14" height="2" rx="1" fill="#0D9B6B" opacity="0.45"/>

  <!-- Amber "done" badge circle bottom-right -->
  <circle cx="44" cy="44" r="12" fill="#F59E0B"/>
  <circle cx="44" cy="44" r="12" fill="rgba(255,255,255,0.18)"/>

  <!-- Checkmark -->
  <polyline points="38.5,44.5 42.5,48.5 50,40"
    fill="none" stroke="white" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
